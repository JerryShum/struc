services:
  db:
    image: postgres:15-alpine
    container_name: struc-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: struc_user
      POSTGRES_PASSWORD: struc_pass
      POSTGRES_DB: struc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U struc_user -d struc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: struc-backend
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://struc_user:struc_pass@db:5432/struc_db
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
